    sdk: flutter
  font_awesome_flutter: ^10.6.0
  flutter_markdown: ^0.7.6
  markdown: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
